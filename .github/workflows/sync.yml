name: Letterboxd × JustWatch Sync

on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run sync
        env:
          LB_CSRF:          ${{ secrets.LB_CSRF }}
          LB_SESSION:       ${{ secrets.LB_SESSION }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: python letterboxd_justwatch.py
